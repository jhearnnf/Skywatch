<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 68" width="290" height="68" role="img" aria-label="SkyWatch">
  <title>SkyWatch</title>

  <!-- Top-left corner bracket -->
  <path d="M4 24 L4 4 L24 4" fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="square" opacity="0.5"/>

  <!-- Bottom-right corner bracket -->
  <path d="M286 44 L286 64 L266 64" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="square" opacity="0.25"/>

  <!-- Accent line beneath Sky -->
  <line x1="14" y1="60" x2="112" y2="60" stroke="#1d4ed8" stroke-width="1" opacity="0.35"/>

  <!-- SkyWatch wordmark -->
  <text
    x="14"
    y="53"
    font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="52"
  >
    <tspan fill="#1d4ed8" textLength="98" lengthAdjust="spacingAndGlyphs">Sky</tspan><tspan fill="#0f172a" textLength="163" lengthAdjust="spacingAndGlyphs">Watch</tspan>
  </text>
</svg>
